<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Irongate Test Client</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
      padding: 40px;
      max-width: 480px;
      width: 100%;
    }
    h1 { font-size: 24px; margin-bottom: 8px; }
    .subtitle { color: #666; margin-bottom: 32px; }
    .btn {
      display: inline-block;
      background: #111;
      color: #fff;
      border: none;
      padding: 12px 32px;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      text-decoration: none;
    }
    .btn:hover { background: #333; }
    .btn-logout {
      background: #dc3545;
      font-size: 14px;
      padding: 8px 20px;
      margin-top: 24px;
    }
    .btn-logout:hover { background: #a71d2a; }
    .user-info { margin-top: 20px; }
    .user-info dt { font-weight: 600; margin-top: 12px; color: #333; }
    .user-info dd { color: #555; margin-top: 2px; word-break: break-all; }
    .error { color: #dc3545; margin-top: 16px; }
    .token-raw {
      margin-top: 24px;
      background: #f8f8f8;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 16px;
      font-family: monospace;
      font-size: 12px;
      word-break: break-all;
      max-height: 200px;
      overflow-y: auto;
    }
  </style>
</head>
<body>
  <div class="card" id="app"></div>

  <script>
    const AUTH_SERVER = 'http://localhost:9000';
    const CLIENT_ID = 'test-app';
    const REDIRECT_URI = 'http://localhost:3000/';

    // --- PKCE helpers ---
    function base64UrlEncode(buf) {
      return btoa(String.fromCharCode(...new Uint8Array(buf)))
        .replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
    }

    function generateRandom() {
      const arr = new Uint8Array(32);
      crypto.getRandomValues(arr);
      return base64UrlEncode(arr);
    }

    async function sha256(plain) {
      const data = new TextEncoder().encode(plain);
      return crypto.subtle.digest('SHA-256', data);
    }

    // --- JWT decode (no verification, display only) ---
    function decodeJwt(token) {
      try {
        const payload = token.split('.')[1];
        const padded = payload.replace(/-/g, '+').replace(/_/g, '/');
        return JSON.parse(atob(padded));
      } catch { return null; }
    }

    // --- Views ---
    function renderLogin() {
      document.getElementById('app').innerHTML = `
        <h1>Irongate Test Client</h1>
        <p class="subtitle">OAuth 2.0 Authorization Code + PKCE</p>
        <button class="btn" id="loginBtn">Login with Irongate</button>
      `;
      document.getElementById('loginBtn').onclick = startLogin;
    }

    function renderLoggedIn(tokens) {
      const claims = decodeJwt(tokens.access_token);
      const app = document.getElementById('app');

      let html = `<h1>Logged In</h1>`;

      if (claims) {
        html += `<dl class="user-info">`;
        if (claims.sub) html += `<dt>Subject</dt><dd>${claims.sub}</dd>`;
        if (claims.iss) html += `<dt>Issuer</dt><dd>${claims.iss}</dd>`;
        if (claims.aud) html += `<dt>Audience</dt><dd>${claims.aud}</dd>`;
        if (claims.exp) html += `<dt>Expires</dt><dd>${new Date(claims.exp * 1000).toLocaleString()}</dd>`;
        html += `</dl>`;
      }

      html += `<div class="token-raw"><strong>Access Token:</strong><br>${tokens.access_token}</div>`;
      if (tokens.refresh_token) {
        html += `<div class="token-raw"><strong>Refresh Token:</strong><br>${tokens.refresh_token}</div>`;
      }

      html += `<button class="btn btn-logout" id="logoutBtn">Logout</button>`;
      app.innerHTML = html;

      document.getElementById('logoutBtn').onclick = () => {
        sessionStorage.clear();
        localStorage.removeItem('tokens');
        window.location = REDIRECT_URI;
      };
    }

    function renderError(msg) {
      document.getElementById('app').innerHTML = `
        <h1>Error</h1>
        <p class="error">${msg}</p>
        <br><button class="btn" onclick="window.location='${REDIRECT_URI}'">Try Again</button>
      `;
    }

    // --- OAuth flow ---
    async function startLogin() {
      const verifier = generateRandom();
      const state = generateRandom();
      const challenge = base64UrlEncode(await sha256(verifier));

      sessionStorage.setItem('pkce_verifier', verifier);
      sessionStorage.setItem('oauth_state', state);

      const params = new URLSearchParams({
        response_type: 'code',
        client_id: CLIENT_ID,
        redirect_uri: REDIRECT_URI,
        state: state,
        code_challenge: challenge,
        code_challenge_method: 'S256',
        provider: 'password',
      });

      window.location = `${AUTH_SERVER}/authorize?${params}`;
    }

    async function exchangeCode(code) {
      const verifier = sessionStorage.getItem('pkce_verifier');
      if (!verifier) { renderError('Missing PKCE verifier. Try logging in again.'); return; }

      const resp = await fetch(`${AUTH_SERVER}/token`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: new URLSearchParams({
          grant_type: 'authorization_code',
          client_id: CLIENT_ID,
          code: code,
          redirect_uri: REDIRECT_URI,
          code_verifier: verifier,
        }),
      });

      sessionStorage.removeItem('pkce_verifier');
      sessionStorage.removeItem('oauth_state');

      if (!resp.ok) {
        const err = await resp.text();
        renderError(`Token exchange failed (${resp.status}): ${err}`);
        return;
      }

      const tokens = await resp.json();
      localStorage.setItem('tokens', JSON.stringify(tokens));
      // Clean URL
      window.history.replaceState({}, '', REDIRECT_URI);
      renderLoggedIn(tokens);
    }

    // --- Init ---
    (function main() {
      // Check for stored tokens
      const stored = localStorage.getItem('tokens');
      if (stored) {
        const tokens = JSON.parse(stored);
        const claims = decodeJwt(tokens.access_token);
        if (claims && claims.exp && claims.exp * 1000 > Date.now()) {
          renderLoggedIn(tokens);
          return;
        }
        localStorage.removeItem('tokens');
      }

      // Check for callback
      const params = new URLSearchParams(window.location.search);
      const code = params.get('code');
      const state = params.get('state');
      const error = params.get('error');

      if (error) {
        renderError(`OAuth error: ${error} - ${params.get('error_description') || ''}`);
        return;
      }

      if (code) {
        const storedState = sessionStorage.getItem('oauth_state');
        if (state !== storedState) {
          renderError('State mismatch. Possible CSRF attack.');
          return;
        }
        exchangeCode(code);
        return;
      }

      renderLogin();
    })();
  </script>
</body>
</html>
